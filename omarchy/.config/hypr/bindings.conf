# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
# bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- bitwarden-desktop

## WEb APPS
# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment

# AI
bindd = SUPER SHIFT, A, Gemini, exec, omarchy-launch-or-focus-webapp Gemini "https://gemini.google.com"
bindd = SUPER SHIFT ALT, A, ChatGPT, exec, omarchy-launch-or-focus-webapp ChatGPT "https://chatgpt.com"
bindd = SUPER SHIFT CTRL, A, Grok, exec, omarchy-launch-or-focus-webapp Grok "https://grok.com"

# Utils
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://gmail.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-or-focus-webapp X "https://x.com/"
bindd = SUPER SHIFT, M, Youtube Music, exec, omarchy-launch-or-focus-webapp "Youtube Music" "https://music.youtube.com/"
# bindd = SUPER SHIFT, T, Translator, exec, omarchy-launch-webapp "https://translate.google.com/"

# Messages
bindd = SUPER SHIFT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Telegram, exec, omarchy-launch-or-focus-webapp Telegram "https://web.telegram.org/"
bindd = SUPER SHIFT ALT, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"

#TODO move to a new file to use only on stow pc
# Change monitor AOC
bind = SUPER, F1, exec, ddcutil setvcp 60 0x0f #TO PC
bind = SUPER, F2, exec, ddcutil setvcp 60 0x12 #TO MACKBOOK

# Change monitor DELL
bind = SUPER, F3, exec, ddcutil --display 2 setvcp 60 0x0f #TO PC
bind = SUPER, F4, exec, ddcutil --display 2 setvcp 60 0x11 #TO MACKBOOK

#BRIGHTNESS MAX AND MIN
bind = SUPER, F5, exec, ddcutil --display 1 setvcp 10 0; ddcutil --display 2 setvcp 10 0
bind = SUPER, F6, exec, ddcutil --display 1 setvcp 10 30; ddcutil --display 2 setvcp 10 30
bind = SUPER, F7, exec, ddcutil --display 1 setvcp 10 70; ddcutil --display 2 setvcp 10 70
bind = SUPER, F8, exec, ddcutil --display 1 setvcp 10 100; ddcutil --display 2 setvcp 10 100
bindd = SUPER, F9, Toggle monitor layout, exec, toggle-monitors
