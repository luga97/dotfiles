
#bindings
#binding setting
set -g prefix ^S
set -g base-index 1
set -g renumber-windows on 
setw -g mode-keys vi

# horizontal split 
unbind s
bind s split-window -v -c "#{pane_current_path}"

# vertical split 
unbind v
bind v split-window -h -c "#{pane_current_path}"

#remap session tree to S
bind S choose-tree -s

#moving with HJKL
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#reload tmux config
unbind r
bind r source-file ~/.tmux.conf
#mouse on
set -g mouse on

#plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# restore settings
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'



# styling
set -g @plugin 'catppuccin/tmux#v2.1.3' # Forzamos la versión exacta para evitar bugs
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Forzar que se vea el nombre de la ventana (#W) y no la ruta
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_current_background "#{@thm_mauve}"

# Configuración de la barra de estado
set-option -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""

# Módulos de la derecha (Aplicación y Sesión con sus iconos)
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Si quieres que el separador sea redondo como en tu imagen de referencia
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
